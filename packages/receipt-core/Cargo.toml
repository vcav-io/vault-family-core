[package]
name = "receipt-core"
description = "VCAV Receipt: Cryptographic receipt generation and signing"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
vault-family-types = { path = "../vault-family-types" }
serde.workspace = true
serde_json = { workspace = true, features = ["raw_value"] }
ed25519-dalek.workspace = true
sha2.workspace = true
chrono.workspace = true
thiserror.workspace = true
rand.workspace = true
hex.workspace = true
base64.workspace = true
unicode-normalization.workspace = true

[[bin]]
name = "vcav-agreement-hash"
path = "src/bin/vcav-agreement-hash.rs"

[[bin]]
name = "vcav-generate-vectors"
path = "src/bin/vcav-generate-vectors.rs"

[[bin]]
name = "vcav-sign-manifest"
path = "src/bin/vcav-sign-manifest.rs"

[[bin]]
name = "vcav-keyring"
path = "src/bin/vcav-keyring.rs"

[dev-dependencies]
proptest.workspace = true
